# Pezzrr dashboard — snowflakepower.com
#
# Serves the built SPA as static files and reverse-proxies the API on
# 127.0.0.1:8077. This is the HTTP-only baseline; run certbot --nginx (see
# deploy/README.md) to add the TLS listeners and the 80->443 redirect, exactly
# as the other sites on this host are configured.
#
# The host nginx remains the only process on 80/443 — this just adds one more
# server block alongside rongxinyin.com and flextech-energy.com.

server {
    listen 80;
    listen [::]:80;
    server_name snowflakepower.com www.snowflakepower.com;

    root /var/www/snowflakepower.com/dist;
    index index.html;

    # SSE live stream: disable buffering and allow long-lived connections so
    # EventSource (/api/v1/stream/homes/{id}) streams in real time. More
    # specific than /api/, so it wins for stream paths.
    location /api/v1/stream/ {
        proxy_pass http://127.0.0.1:8077;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # REST API. proxy_pass without a URI path preserves the full /api/v1/...
    # request URI, which is what the FastAPI app serves.
    location /api/ {
        proxy_pass http://127.0.0.1:8077;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve static assets, fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
